<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 Service Unavailable</title>
    <style>
        body {
            background-color: #fff;
            color: #222;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 2rem;
            font-weight: normal;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            color: #444;
        }
    </style>
</head>
<body>

<div class="error-container">
    <h1>Service Unavailable</h1>
    <p>
        本サイトが利用しているサーバーホスティングサービスとの契約終了、およびアカウントの凍結により、すべてのコンテンツの公開が停止されました。
運営ポリシーの変更に伴い、本ドメイン下のリソースはすべて削除プロセスに移行しており、再公開の予定はございません。管理者によるバックアップデータの保持も終了しております。
    </p>
    <hr>
    <p style="font-size: 0.9rem; color: #888;">
        Apache/2.4.41 (Ubuntu) Server at Port 80
    </p>
</div>

</body>
</html>
